<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发货分析 - HUASUE</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #e63946;
            --secondary: #1d3557;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #333;
            --text-light: #666;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
        }
        
        .header {
            background: linear-gradient(135deg, var(--secondary), #457b9d);
            color: white;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
        }
        
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header .subtitle { opacity: 0.9; font-size: 14px; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
        }
        
        .stat-card .value {
            font-size: 36px;
            font-weight: bold;
            color: var(--primary);
        }
        
        .stat-card .label {
            color: var(--text-light);
            font-size: 14px;
            margin-top: 8px;
        }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 30px;
        }
        
        .chart-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .chart-card.full-width {
            grid-column: span 2;
        }
        
        .chart-card h3 {
            font-size: 18px;
            margin-bottom: 20px;
            color: var(--secondary);
        }
        
        .chart-container {
            position: relative;
            height: 300px;
        }
        
        .chart-container.tall {
            height: 400px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        th {
            background: var(--secondary);
            color: white;
            font-weight: 500;
        }
        
        tr:hover { background: #f5f5f5; }
        
        .rank-badge {
            display: inline-block;
            width: 24px;
            height: 24px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 24px;
            font-size: 12px;
            margin-right: 8px;
        }
        
        .rank-badge.gold { background: #ffd700; }
        .rank-badge.silver { background: #c0c0c0; }
        .rank-badge.bronze { background: #cd7f32; }
        
        @media (max-width: 768px) {
            .charts-grid { grid-template-columns: 1fr; }
            .chart-card.full-width { grid-column: span 1; }
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: var(--text-light);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚚 发货分析报表</h1>
        <div class="subtitle">HUASUE MOULD PLASTIC CO., LTD | 华塑模具有限公司</div>
    </div>
    
    <!-- 关键指标 -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="value" id="totalRecords">-</div>
            <div class="label">总发货记录</div>
        </div>
        <div class="stat-card">
            <div class="value" id="totalBoxes">-</div>
            <div class="label">总发货箱数</div>
        </div>
        <div class="stat-card">
            <div class="value" id="totalPlates">-</div>
            <div class="label">活跃车牌数</div>
        </div>
        <div class="stat-card">
            <div class="value" id="totalCustomers">-</div>
            <div class="label">发货客户数</div>
        </div>
    </div>
    
    <!-- 图表区域 -->
    <div class="charts-grid">
        <!-- 1. 每日发货趋势 -->
        <div class="chart-card full-width">
            <h3>📈 每日发货量趋势</h3>
            <div class="chart-container">
                <canvas id="dailyTrendChart"></canvas>
            </div>
        </div>
        
        <!-- 2. 车牌效率分析 -->
        <div class="chart-card">
            <h3>🚛 车牌送货效率排名</h3>
            <div class="chart-container">
                <canvas id="plateEfficiencyChart"></canvas>
            </div>
        </div>
        
        <!-- 3. 目的地分布 -->
        <div class="chart-card">
            <h3>📍 目的地分布</h3>
            <div class="chart-container">
                <canvas id="destinationChart"></canvas>
            </div>
        </div>
        
        <!-- 4. 客户发货排行 -->
        <div class="chart-card full-width">
            <h3>🏆 客户发货量TOP20</h3>
            <div class="chart-container tall">
                <canvas id="customerRankChart"></canvas>
            </div>
        </div>
        
        <!-- 5. 运输方式分析 -->
        <div class="chart-card">
            <h3>🏭 托运 vs 直送</h3>
            <div class="chart-container">
                <canvas id="deliveryTypeChart"></canvas>
            </div>
        </div>
        
        <!-- 6. 时效分析 -->
        <div class="chart-card">
            <h3>⏱️ 送货时效分布</h3>
            <div class="chart-container">
                <canvas id="timeEfficiencyChart"></canvas>
            </div>
        </div>
    </div>
    
    <div class="footer">
        数据更新时间: <span id="updateTime"></span>
    </div>
    
    <script>
        // 示例数据 - 实际使用时替换为真实数据
        const deliveryData = {
            daily: {
                labels: ['03-24', '03-25', '03-26', '03-27', '03-28', '03-29', '03-30'],
                boxes: [120, 145, 132, 98, 156, 142, 168]
            },
            plates: [
                { name: 'กทพ. 8888', trips: 28, boxes: 456 },
                { name: 'กทพ. 5555', trips: 24, boxes: 389 },
                { name: 'บร. 1234', trips: 21, boxes: 312 },
                { name: 'กทพ. 7777', trips: 18, boxes: 267 },
                { name: 'สร. 9999', trips: 15, boxes: 198 }
            ],
            destinations: [
                { name: '春武里府', count: 245 },
                { name: '佛统府', count: 189 },
                { name: '曼谷', count: 156 },
                { name: '北揽府', count: 98 },
                { name: '其他', count: 67 }
            ],
            customers: [
                { name: '客户 A', boxes: 234 },
                { name: '客户 B', boxes: 189 },
                { name: '客户 C', boxes: 156 },
                { name: '客户 D', boxes: 134 },
                { name: '客户 E', boxes: 112 }
            ],
            deliveryType: [
                { name: '直送', value: 65 },
                { name: '托运', value: 35 }
            ],
            timeEfficiency: [
                { name: '≤2小时', value: 45 },
                { name: '2-4小时', value: 32 },
                { name: '4-6小时', value: 15 },
                { name: '>6小时', value: 8 }
            ]
        };
        
        // 更新统计卡片
        document.getElementById('totalRecords').textContent = '156';
        document.getElementById('totalBoxes').textContent = '1,234';
        document.getElementById('totalPlates').textContent = '8';
        document.getElementById('totalCustomers').textContent = '45';
        document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN');
        
        // 1. 每日发货趋势图
        new Chart(document.getElementById('dailyTrendChart'), {
            type: 'line',
            data: {
                labels: deliveryData.daily.labels,
                datasets: [{
                    label: '发货箱数',
                    data: deliveryData.daily.boxes,
                    borderColor: '#e63946',
                    backgroundColor: 'rgba(230, 57, 70, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
        
        // 2. 车牌效率图
        new Chart(document.getElementById('plateEfficiencyChart'), {
            type: 'bar',
            data: {
                labels: deliveryData.plates.map(p => p.name),
                datasets: [{
                    label: '送货箱数',
                    data: deliveryData.plates.map(p => p.boxes),
                    backgroundColor: ['#e63946', '#457b9d', '#1d3557', '#a8dadc', '#f4a261']
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                indexAxis: 'y'
            }
        });
        
        // 3. 目的地分布图
        new Chart(document.getElementById('destinationChart'), {
            type: 'doughnut',
            data: {
                labels: deliveryData.destinations.map(d => d.name),
                datasets: [{
                    data: deliveryData.destinations.map(d => d.count),
                    backgroundColor: ['#e63946', '#457b9d', '#1d3557', '#a8dadc', '#f4a261']
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });
        
        // 4. 客户排行图
        new Chart(document.getElementById('customerRankChart'), {
            type: 'bar',
            data: {
                labels: deliveryData.customers.map(c => c.name),
                datasets: [{
                    label: '发货箱数',
                    data: deliveryData.customers.map(c => c.boxes),
                    backgroundColor: '#e63946'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                }
            }
        });
        
        // 5. 运输方式图
        new Chart(document.getElementById('deliveryTypeChart'), {
            type: 'pie',
            data: {
                labels: deliveryData.deliveryType.map(d => d.name),
                datasets: [{
                    data: deliveryData.deliveryType.map(d => d.value),
                    backgroundColor: ['#e63946', '#457b9d']
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });
        
        // 6. 时效分布图
        new Chart(document.getElementById('timeEfficiencyChart'), {
            type: 'bar',
            data: {
                labels: deliveryData.timeEfficiency.map(t => t.name),
                datasets: [{
                    label: '占比 %',
                    data: deliveryData.timeEfficiency.map(t => t.value),
                    backgroundColor: ['#2a9d8f', '#457b9d', '#e9c46a', '#e76f51']
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                }
            }
        });
    </script>
</body>
</html>
